# ?? Actuator / Prometheus ?????????????????????????????????????????????????
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ?? SpringDoc / Swagger UI ????????????????????????????????????????????????
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method

# ?? Logging ???????????????????????????????????????????????????????????????
logging:
  level:
    root: INFO
    com.agriconnect: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.kafka: INFO

# ?? Topics Kafka (r�f�rence centralis�e) ?????????????????????????????????
kafka:
  topics:
    commande-creee: commande-creee
    commande-validee: commande-validee
    offre-publiee: offre-publiee
    message-envoye: message-envoye
    notification: notification

---
# ?? Profil de test ????????????????????????????????????????????????????????
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092  # remplac� par EmbeddedKafka dans les tests
eureka:
  client:
    enabled: false   # d�sactiv� en test